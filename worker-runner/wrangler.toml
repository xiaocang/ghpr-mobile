name = "ghpr-worker-runner"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[triggers]
crons = ["*/5 * * * *"]

[[services]]
binding = "SERVER"
service = "ghpr-server"

[vars]
# Official server. Override if you self-host.
WORKER_URL = "https://ghpr-server.xiaocang.workers.dev"

# Secrets (set via `wrangler secret put`):
# GITHUB_TOKEN - GitHub PAT with actions + repo scope
# RUNNER_TOKEN - the pairing token from runner registration
